<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Опрос ЖК «Энфилд»</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 16px;
            padding-bottom: 24px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            margin-bottom: 8px;
        }
        .description {
            text-align: center;
            color: var(--tg-theme-hint-color, #8e8e93);
            margin-bottom: 20px;
        }
        .question {
            margin-bottom: 24px;
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color, #f2f2f7);
            border-radius: 16px;
        }
        .q-text {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 14px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            background: var(--tg-theme-bg-color, #ffffff);
            border: 1px solid var(--tg-theme-hint-color, rgba(0,0,0,0.1));
            cursor: pointer;
            transition: background 0.2s;
        }
        .option:hover {
            background: var(--tg-theme-secondary-bg-color, #e5e5ea);
        }
        .option input[type="radio"] {
            accent-color: var(--tg-theme-button-color, #007aff);
            width: 20px;
            height: 20px;
            margin: 0;
            cursor: pointer;
            flex-shrink: 0;
        }
        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 15px;
        }
        button {
            background: var(--tg-theme-button-color, #007aff);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            padding: 16px 24px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error {
            color: #ff3b30;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }
        .success {
            color: #34c759;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }
        .custom-input {
            margin-top: 12px;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            font-size: 15px;
            display: none;
        }
        .custom-input.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Опрос для жителей ЖК «Энфилд»</h2>
        <p class="description">Пожалуйста, ответьте на все вопросы</p>
        <form id="surveyForm">
            <div id="questionsContainer"></div>
            <button type="submit" id="submitBtn">📤 Отправить ответы</button>
            <div id="statusMessage" class="error"></div>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
